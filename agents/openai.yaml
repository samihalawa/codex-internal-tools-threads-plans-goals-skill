interface:
  display_name: "Codex Internal Tools Threads Plans Goals"
  short_description: "Use Codex app tools to inspect projects and threads, recover prior working approaches, create or steer background tasks, manage plans/goals/titles, and reduce repeated failed agent work."
  default_prompt: "Use $codex-internal-tools-threads-plans-goals-skill when the user asks to inspect Codex projects or threads, create or steer a background Codex task, recover what worked in prior threads, read the current thread terminal, rename/pin/archive threads, manage plans or goals, schedule Codex follow-ups, orchestrate multiple Codex threads, or avoid reinventing a prior solution. Normalize typo-heavy intent, search similar threads before inventing a new route, read terminal/thread evidence directly, use codex_app tools before raw session-log fallbacks, add loop exit conditions for repeated failures, analyze erroneous structured-input lines line by line when relevant, and close with coverage plus proof read."
